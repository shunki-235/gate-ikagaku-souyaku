name: Deploy to staging

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
      - ".claude/**"
      - ".cursorrules"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "DEPLOY_STAGING.md"
      - "dev-start.sh"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  sftp-deploy:
    name: SFTP deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Prepare deploy files
        run: |
          DEPLOY_DIR="$RUNNER_TEMP/deploy-staging"
          rm -rf "$DEPLOY_DIR"
          mkdir -p "$DEPLOY_DIR"
          rsync -av --delete \
            --exclude=".git/" \
            --exclude=".gitignore" \
            --exclude=".gitattributes" \
            --exclude=".gitmodules" \
            --exclude=".github/" \
            --exclude=".claude/" \
            --exclude=".cursorrules" \
            --exclude=".DS_Store" \
            --exclude=".ftp-deploy-sync-state.json" \
            --exclude="node_modules/" \
            --exclude="AGENTS.md" \
            --exclude="CLAUDE.md" \
            --exclude="DEPLOY_STAGING.md" \
            --exclude="dev-start.sh" \
            --exclude="package.json" \
            --exclude="pnpm-lock.yaml" \
            ./ "$DEPLOY_DIR"/
          echo "DEPLOY_DIR=$DEPLOY_DIR" >> "$GITHUB_ENV"

      - name: Deploy to staging server
        env:
          STAGING_SFTP_SERVER: ${{ secrets.STAGING_FTP_SERVER }}
          STAGING_SFTP_USERNAME: ${{ secrets.STAGING_FTP_USERNAME }}
          STAGING_SFTP_PASSWORD: ${{ secrets.STAGING_FTP_PASSWORD }}
          STAGING_SFTP_REMOTE_DIR: ${{ vars.STAGING_SFTP_REMOTE_DIR || vars.STAGING_FTP_SERVER_DIR || './' }}
        run: |
          export LFTP_PASSWORD="$STAGING_SFTP_PASSWORD"

          lftp --env-password -u "$STAGING_SFTP_USERNAME" "sftp://$STAGING_SFTP_SERVER" <<EOF
          set cmd:fail-exit yes
          set net:max-retries 2
          set net:timeout 20
          set sftp:auto-confirm yes
          lcd $DEPLOY_DIR
          mkdir -p "$STAGING_SFTP_REMOTE_DIR"
          mirror --reverse --delete --verbose . "$STAGING_SFTP_REMOTE_DIR"
          bye
          EOF
