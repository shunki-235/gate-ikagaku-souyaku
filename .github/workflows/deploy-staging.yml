name: Deploy to staging

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
      - ".claude/**"
      - ".cursorrules"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "DEPLOY_STAGING.md"
      - "dev-start.sh"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  ftps-deploy:
    name: FTPS deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Prepare deploy files
        run: |
          DEPLOY_DIR="$RUNNER_TEMP/deploy-staging"
          rm -rf "$DEPLOY_DIR"
          mkdir -p "$DEPLOY_DIR"
          rsync -av --delete \
            --exclude=".git/" \
            --exclude=".gitignore" \
            --exclude=".gitattributes" \
            --exclude=".gitmodules" \
            --exclude=".github/" \
            --exclude=".claude/" \
            --exclude=".cursorrules" \
            --exclude=".DS_Store" \
            --exclude=".ftp-deploy-sync-state.json" \
            --exclude="node_modules/" \
            --exclude="AGENTS.md" \
            --exclude="CLAUDE.md" \
            --exclude="DEPLOY_STAGING.md" \
            --exclude="dev-start.sh" \
            --exclude="package.json" \
            --exclude="pnpm-lock.yaml" \
            ./ "$DEPLOY_DIR"/
          echo "DEPLOY_DIR=$DEPLOY_DIR" >> "$GITHUB_ENV"

      - name: Deploy to staging server
        env:
          STAGING_FTP_SERVER: ${{ secrets.STAGING_FTP_SERVER }}
          STAGING_FTP_USERNAME: ${{ secrets.STAGING_FTP_USERNAME }}
          STAGING_FTP_PASSWORD: ${{ secrets.STAGING_FTP_PASSWORD }}
          STAGING_FTP_SERVER_DIR: ${{ vars.STAGING_FTP_SERVER_DIR || vars.STAGING_SFTP_REMOTE_DIR || './' }}
        run: |
          REMOTE_DIR="${STAGING_FTP_SERVER_DIR#./}"

          lftp <<EOF
          set cmd:fail-exit yes
          set net:max-retries 2
          set net:timeout 20
          set ftp:ssl-auth TLS
          set ftp:ssl-force yes
          set ftp:ssl-protect-data yes
          set ftp:passive-mode yes
          set ftp:prefer-epsv false
          set ftp:use-feat no
          open "$STAGING_FTP_SERVER"
          user "$STAGING_FTP_USERNAME" "$STAGING_FTP_PASSWORD"
          mirror --reverse --delete --only-newer --verbose "$DEPLOY_DIR" "$REMOTE_DIR"
          bye
          EOF
