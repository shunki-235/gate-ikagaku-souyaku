name: Deploy to staging

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
      - ".claude/**"
      - ".cursorrules"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "DEPLOY_STAGING.md"
      - "dev-start.sh"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  sftp-deploy:
    name: SFTP deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.STAGING_FTP_SERVER }}
          username: ${{ secrets.STAGING_FTP_USERNAME }}
          password: ${{ secrets.STAGING_FTP_PASSWORD }}
          local_path: "./*"
          remote_path: ${{ vars.STAGING_SFTP_REMOTE_DIR || vars.STAGING_FTP_SERVER_DIR || './' }}
          sftp_only: true
          rsyncArgs: >-
            --exclude=.git/
            --exclude=.gitignore
            --exclude=.gitattributes
            --exclude=.gitmodules
            --exclude=.github/
            --exclude=.claude/
            --exclude=.cursorrules
            --exclude=.DS_Store
            --exclude=.ftp-deploy-sync-state.json
            --exclude=node_modules/
            --exclude=AGENTS.md
            --exclude=CLAUDE.md
            --exclude=DEPLOY_STAGING.md
            --exclude=dev-start.sh
            --exclude=package.json
            --exclude=pnpm-lock.yaml
