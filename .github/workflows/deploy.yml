name: Deploy

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: デプロイ先環境
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

jobs:
  deploy_staging:
    name: Deploy to Staging Server
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'staging')
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to staging FTP server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          protocol: ftps
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/CLAUDE.md
            **/AGENTS.md
            **/DESIGN.md
            **/.cursorrules
            **/.claude/**
            **/package.json
            **/pnpm-lock.yaml
            **/dev-start.sh
            **/proposal-*.html
            **/.htaccess
            **/.htpasswd
            **/.htaccess.example

      - name: Staging deployment successful
        run: echo "Staging deployment completed successfully!"

  deploy_production:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production')
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to production FTP server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_PRODUCTION }}
          username: ${{ secrets.FTP_USERNAME_PRODUCTION }}
          password: ${{ secrets.FTP_PASSWORD_PRODUCTION }}
          server-dir: ${{ secrets.FTP_SERVER_DIR_PRODUCTION }}
          protocol: ftps
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/CLAUDE.md
            **/AGENTS.md
            **/DESIGN.md
            **/.cursorrules
            **/.claude/**
            **/package.json
            **/pnpm-lock.yaml
            **/dev-start.sh
            **/proposal-*.html
            **/.htaccess
            **/.htpasswd
            **/.htaccess.example

      - name: Production deployment successful
        run: echo "Production deployment completed successfully!"

  # PRの場合はシンタックスチェックのみ
  validate:
    name: Validate PHP Syntax
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Check PHP syntax
        run: |
          echo "Checking PHP syntax..."
          find . -name "*.php" -exec php -l {} \; | grep -v "No syntax errors"
          echo "PHP syntax check completed!"
